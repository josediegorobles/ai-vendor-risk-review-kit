review:
  id: "sample-notion-ai"
  title: "Notion AI Vendor Risk Review"
  version: "0.1.0"
  date: "2026-06-19"
  reviewer: "Jose Robles"
  status: "sample"
vendor:
  name: "Notion"
  product: "Notion AI"
  plan: "Business or Enterprise workspace"
  homepage: "https://www.notion.com/product/ai"
  privacy_url: "https://www.notion.com/help/notion-ai-security-practices"
  security_url: "https://www.notion.com/security"
  terms_url: "https://www.notion.com/terms-and-privacy"
adoption_scenario:
  company_profile: "An 85-person agency and operations consultancy using Notion as its internal wiki, project hub, and client delivery workspace."
  intended_use: "Enable Notion AI to summarize project pages, draft meeting notes, search internal knowledge, rewrite client-facing drafts, and help staff find procedures."
  users: "Consultants, project managers, operations, HR, and leadership."
  deployment_context: "The company uses shared client spaces, guest access, HR pages, project databases, and internal SOPs in the same Notion workspace. Permission hygiene is uneven."
  decision_impact: "AI outputs will support internal knowledge work and drafts. They should not determine HR, performance, contractual, legal, or client delivery decisions without human review."
  non_goals:
    - "No use for employee scoring, hiring, performance evaluation, or disciplinary decisions."
    - "No automatic client advice or contractual interpretation."
    - "No Enterprise Search connector rollout until the base workspace permissions are reviewed."
executive_summary:
  verdict: "Go with controls"
  risk_level: "Medium"
  summary: "Notion AI is a useful candidate for knowledge-work acceleration where Notion is already the company wiki. The main risk is workspace permission sprawl: if sensitive HR, client, finance, or strategy pages are broadly visible, AI search and summarization can make that exposure easier to discover and reuse."
  key_risks:
    - "Users may query across pages they can access but should not need for their role."
    - "Client workspaces and guest access can complicate confidentiality boundaries."
    - "AI subprocessors and retention differ by plan and feature, especially for Enterprise versus non-Enterprise workspaces."
    - "Generated summaries may flatten caveats, dates, or ownership in operational procedures."
  key_controls:
    - "Review teamspaces, guests, inherited page permissions, and sensitive HR/client areas before rollout."
    - "Limit AI use to approved teamspaces during the pilot."
    - "Confirm subprocessor, retention, zero-data-retention, and Enterprise plan details."
    - "Require human approval before using generated client-facing text."
  caveats:
    - "This sample uses public Notion documentation and does not inspect private Trust Center reports."
    - "Enterprise Search, AI connectors, and third-party connected apps require separate data-flow review."
    - "This is a technical procurement review, not legal advice."
data_exposure_map:
  - category: "Workspace pages and databases"
    examples:
      - "Project pages"
      - "SOPs"
      - "Meeting notes"
      - "Client delivery databases"
    source_systems:
      - "Notion workspace"
      - "Teamspaces"
      - "Shared pages"
    exposure_path: "Notion AI may use pages available to the requesting user to answer, summarize, or draft content."
    sensitivity: "Medium"
    retention_or_processing_note: "Notion states AI respects existing permissions and describes different LLM provider retention defaults by plan."
    control_notes: "Pilot only in reviewed teamspaces and remove broad access from sensitive databases."
  - category: "Client confidential information"
    examples:
      - "Client strategy notes"
      - "Contracts excerpts"
      - "Delivery risks"
      - "Commercial terms"
    source_systems:
      - "Client workspaces"
      - "Shared pages"
      - "Consultant notes"
    exposure_path: "Users may ask Notion AI to summarize or rewrite client pages and then reuse output externally."
    sensitivity: "High"
    retention_or_processing_note: "Client confidentiality obligations may be stricter than default workspace settings or public vendor documentation."
    control_notes: "Separate client spaces, restrict guest visibility, and require client-facing review before reuse."
  - category: "HR and internal operations"
    examples:
      - "People notes"
      - "Performance context"
      - "Compensation planning"
      - "Internal incidents"
    source_systems:
      - "HR teamspace"
      - "Leadership pages"
      - "Private databases"
    exposure_path: "If HR pages are visible to broad groups, AI features may make sensitive context easier to locate."
    sensitivity: "High"
    retention_or_processing_note: "The review assumes HR use is out of scope; any HR AI use needs separate review."
    control_notes: "Exclude HR and performance content from pilot; audit page access and guest access."
ai_act_role_hypothesis:
  likely_role: "Customer as deployer of a third-party AI system for internal knowledge work; Notion as vendor/provider of the workspace AI service, subject to exact contract and feature use."
  risk_classification: "Likely not high-risk for the stated knowledge-search and drafting use if HR, hiring, worker evaluation, client eligibility, and other high-impact decisions remain excluded."
  rationale: "The planned deployment is assistive and focused on summarization, drafting, and knowledge retrieval. Human staff remain responsible for decisions and external outputs. The risk hypothesis changes if Notion AI is used in HR, employee management, performance review, or decisions affecting natural persons."
  caveats:
    - "Use in HR or worker management can materially change AI Act analysis and should be reviewed separately."
    - "Enterprise Search and external connectors can expand data sources and must be mapped before rollout."
    - "Final legal interpretation depends on exact use, sector, affected people, and contractual structure."
  review_triggers:
    - "Enabling Enterprise Search or connectors to Slack, Microsoft Teams, Jira, Google Drive, or other systems."
    - "Using AI outputs for HR, hiring, performance, disciplinary, or staffing decisions."
    - "Granting broad guest/client access to AI-enabled workspaces."
security_privacy_questions:
  - category: "Permissions"
    question: "Which teamspaces, pages, and databases are visible to all workspace members or large groups?"
    why_it_matters: "Notion AI respects existing permissions, so poor permissions become easier to exploit through search and summarization."
    evidence_needed: "Workspace access export, sensitive page inventory, and guest access report."
  - category: "Subprocessors"
    question: "Which AI subprocessors process customer data for this plan and feature set?"
    why_it_matters: "AI processing may involve third parties, and plan-specific retention or processing controls may differ."
    evidence_needed: "Notion DPA, subprocessor list, Trust Center artifacts, or procurement response."
  - category: "Retention"
    question: "Does the selected workspace plan receive zero data retention with LLM providers, or a different retention period?"
    why_it_matters: "Notion public docs distinguish Enterprise defaults from non-Enterprise defaults for LLM provider retention."
    evidence_needed: "Plan confirmation and admin/procurement documentation."
  - category: "External sharing"
    question: "Which client or guest pages will have AI-enabled content, and who can ask AI questions over them?"
    why_it_matters: "Client confidentiality and guest access boundaries are often operationally messy in Notion workspaces."
    evidence_needed: "Guest list, client space inventory, and sharing policy."
lock_in_risks:
  - risk: "Workspace-as-operating-system dependency"
    scenario: "The company already runs SOPs, projects, client notes, and knowledge in Notion, then adds AI on top."
    impact: "The cost of leaving Notion rises because knowledge structure, AI habits, and daily operations converge in one platform."
    mitigation: "Maintain export practices, canonical owners, and periodic backups for critical procedures and client records."
  - risk: "Implicit permission model"
    scenario: "Teams rely on inherited page permissions and informal sharing rather than explicit data ownership."
    impact: "Scaling AI use increases the consequences of old access mistakes."
    mitigation: "Assign data owners for sensitive teamspaces and run quarterly access reviews."
  - risk: "AI connector expansion"
    scenario: "After initial success, teams connect Slack, Jira, Drive, or Microsoft Teams to Enterprise Search."
    impact: "Data exposure multiplies across systems before governance catches up."
    mitigation: "Require a separate connector review for each connected source."
human_oversight_checklist:
  - control: "Sensitive teamspaces are excluded from the initial pilot."
    owner: "Operations"
    status: "Required"
    evidence: "Pilot scope list and workspace settings."
  - control: "Client-facing text generated by Notion AI is reviewed by the responsible consultant."
    owner: "Project leads"
    status: "Required"
    evidence: "Delivery checklist and approval note."
  - control: "HR, performance, and staffing decisions do not use AI-generated summaries or recommendations."
    owner: "HR lead"
    status: "Required"
    evidence: "HR exclusion note and training acknowledgement."
  - control: "Workspace access and guest sharing are reviewed before expanding the pilot."
    owner: "IT or operations"
    status: "Recommended"
    evidence: "Access review report."
recommended_controls:
  - priority: "P0"
    control: "Inventory sensitive teamspaces and remove broad access before enabling AI."
    rationale: "Workspace permission hygiene is the central control for Notion AI risk."
    owner: "Operations"
    timing: "Before pilot"
  - priority: "P0"
    control: "Exclude HR, finance, legal, and sensitive client spaces from initial use."
    rationale: "This keeps the first deployment in a lower-risk knowledge-work lane."
    owner: "Leadership"
    timing: "Before pilot"
  - priority: "P1"
    control: "Confirm plan-specific AI retention and subprocessor terms."
    rationale: "Public documentation indicates different retention defaults depending on plan and feature."
    owner: "Procurement"
    timing: "Before purchase"
  - priority: "P1"
    control: "Create page-level guidance for AI summaries and client-facing reuse."
    rationale: "Users need to know when AI output is a draft and when source verification is required."
    owner: "Project management office"
    timing: "Pilot week 1"
final_recommendation:
  outcome: "Go with controls"
  rationale: "Proceed with a limited Notion AI pilot only after workspace permissions and sensitive teamspaces are cleaned up. The tool is reasonable for knowledge search and drafting, but not for HR, performance, or client-impacting decisions without a separate review."
  conditions:
    - "Pilot limited to reviewed teamspaces and named user groups."
    - "HR, finance, legal, and sensitive client spaces excluded from pilot."
    - "Guest access and broad page permissions reviewed."
    - "Plan-specific retention and subprocessor position confirmed."
  pause_triggers:
    - "No reliable inventory of guest access or sensitive pages."
    - "Leadership wants AI summaries for HR or performance management."
    - "Enterprise Search connectors are enabled before source-system review."
  next_review: "Repeat before enabling Enterprise Search, external connectors, HR use cases, or company-wide rollout."
