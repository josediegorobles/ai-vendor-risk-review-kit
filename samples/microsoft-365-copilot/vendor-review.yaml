review:
  id: "sample-microsoft-365-copilot"
  title: "Microsoft 365 Copilot Vendor Risk Review"
  version: "0.1.0"
  date: "2026-06-19"
  reviewer: "Jose Robles"
  status: "sample"
vendor:
  name: "Microsoft"
  product: "Microsoft 365 Copilot"
  plan: "Commercial Microsoft 365 tenant add-on"
  homepage: "https://www.microsoft.com/en-us/microsoft-365/copilot"
  privacy_url: "https://learn.microsoft.com/en-us/microsoft-365/copilot/microsoft-365-copilot-privacy"
  security_url: "https://learn.microsoft.com/en-us/microsoft-365/copilot/enterprise-data-protection"
  terms_url: "https://www.microsoft.com/licensing/terms/productoffering/Microsoft365/MCA"
adoption_scenario:
  company_profile: "A 120-person professional services firm in Spain using Microsoft 365 for email, Teams, SharePoint, OneDrive, Word, Excel, and PowerPoint."
  intended_use: "Enable Copilot for 25 pilot users to summarize meetings, draft client proposals, search internal knowledge, and accelerate document review."
  users: "Partners, sales leads, project managers, and operations staff."
  deployment_context: "The company already uses Entra ID, Microsoft 365 groups, SharePoint sites, Teams channels, and sensitivity labels, but has not completed a permissions cleanup before AI rollout."
  decision_impact: "Copilot output will support internal productivity and client-facing drafts, but humans remain responsible for final decisions and external communications."
  non_goals:
    - "No automated hiring, credit, health, legal, or disciplinary decisions."
    - "No autonomous client advice without professional review."
    - "No custom Copilot agent connected to external systems during the first pilot."
executive_summary:
  verdict: "Go with controls"
  risk_level: "Medium"
  summary: "Microsoft 365 Copilot is a plausible fit for a controlled pilot because it operates inside the Microsoft 365 service boundary and uses existing user permissions. The main adoption risk is not the model itself, but overshared internal data, weak SharePoint/Teams permissions, prompt handling, and users treating generated answers as verified business facts."
  key_risks:
    - "Permission sprawl can make sensitive files discoverable to users through Copilot if those users already have access."
    - "Meeting summaries and document drafts may include client confidential information, employee data, pricing, or strategy."
    - "Web search and agents may introduce separate data-handling terms that need plan-specific review."
    - "Staff may over-rely on generated summaries or proposal drafts without source checks."
  key_controls:
    - "Run a permissions and external sharing cleanup before enabling pilot users."
    - "Limit pilot scope to named user groups and approved business tasks."
    - "Require human review before client-facing reuse of generated content."
    - "Confirm DPA, retention, audit, Purview, sensitivity label, and web query settings with Microsoft documentation and tenant configuration."
  caveats:
    - "This sample uses public Microsoft documentation and does not review private contract terms."
    - "Risk changes materially if Copilot Studio agents or third-party plugins are added."
    - "This is a technical procurement review, not legal advice or AI Act classification."
data_exposure_map:
  - category: "Internal documents"
    examples:
      - "Client proposals"
      - "Project plans"
      - "Internal policies"
      - "Commercial templates"
    source_systems:
      - "SharePoint"
      - "OneDrive"
      - "Teams files"
    exposure_path: "Copilot grounds responses in Microsoft Graph data that the signed-in user is authorized to access."
    sensitivity: "High"
    retention_or_processing_note: "Prompts and responses may be stored in Copilot interaction history and governed by Microsoft 365 retention/audit capabilities depending on configuration."
    control_notes: "Review SharePoint permissions, external sharing, guest access, sensitivity labels, and restricted search options before pilot."
  - category: "Communications"
    examples:
      - "Email threads"
      - "Teams chats"
      - "Meeting transcripts"
      - "Calendar context"
    source_systems:
      - "Exchange"
      - "Teams"
      - "Outlook calendar"
    exposure_path: "Users may ask Copilot to summarize or draft from communications they can already access."
    sensitivity: "High"
    retention_or_processing_note: "Generated summaries can preserve sensitive context even when the original communication is fragmented across systems."
    control_notes: "Define meeting recording/transcription rules and prohibit summarizing privileged or highly confidential meetings without approval."
  - category: "Prompt and response content"
    examples:
      - "User prompts"
      - "Generated proposal text"
      - "Generated analysis"
    source_systems:
      - "Microsoft 365 Copilot"
    exposure_path: "Users enter prompts and receive responses inside Microsoft 365 apps and Copilot chat surfaces."
    sensitivity: "Medium"
    retention_or_processing_note: "Microsoft states enterprise data protection applies to prompts and responses, but customer retention settings and licensing should be verified."
    control_notes: "Create prompt rules for confidential data, client identifiers, legal advice, and personal data."
ai_act_role_hypothesis:
  likely_role: "Customer as deployer of a third-party AI system; Microsoft likely acts as provider/vendor for the product, subject to contract and exact use."
  risk_classification: "Likely not high-risk for the stated productivity pilot, assuming no use for employment, credit, education, health, law enforcement, safety, or access-to-essential-services decisions."
  rationale: "The intended use is productivity support: summarization, drafting, and internal search. The tool does not make or materially determine decisions about natural persons in this scenario. Transparency, user training, human oversight, and data governance remain relevant."
  caveats:
    - "If Copilot outputs are used to rank candidates, evaluate employees, assess customers, or make decisions affecting people, the hypothesis must be reopened."
    - "If the company builds custom agents or places an AI-enabled service on the market, role allocation may change."
    - "Private sector and national guidance may affect the final assessment."
  review_triggers:
    - "Connecting Copilot Studio agents to CRM, HR, finance, ticketing, or customer support systems."
    - "Using outputs directly in client advice or regulated professional work."
    - "Expanding from pilot users to company-wide access without permissions review."
security_privacy_questions:
  - category: "Permissions"
    question: "What percentage of SharePoint sites, Teams channels, and OneDrive folders are accessible beyond their intended audience?"
    why_it_matters: "Copilot can surface information a user is already authorized to access, so existing oversharing becomes AI-discoverable."
    evidence_needed: "Microsoft 365 access review, sharing report, Purview data security posture, or equivalent export."
  - category: "Retention and audit"
    question: "Which retention, eDiscovery, and audit policies apply to Copilot prompts, responses, and interaction history in this tenant?"
    why_it_matters: "The company needs to know how generated content can be reviewed, retained, deleted, or discovered."
    evidence_needed: "Tenant policy screenshots or admin documentation linked to the purchased plan."
  - category: "Web grounding"
    question: "Is web search enabled, and what data-handling commitments apply to generated web queries?"
    why_it_matters: "Microsoft documents separate handling for web queries, including different controller terms for Bing search."
    evidence_needed: "Admin setting export and Microsoft product terms for web query handling."
  - category: "Agents and extensibility"
    question: "Will users be allowed to install, build, or invoke agents, connectors, or plugins during the pilot?"
    why_it_matters: "Agents and third-party integrations can create new data flows beyond the base Copilot review."
    evidence_needed: "Admin policy for Copilot Studio, connectors, app consent, and third-party apps."
lock_in_risks:
  - risk: "Microsoft 365 ecosystem dependency"
    scenario: "Copilot value depends on Microsoft 365 content, identities, labels, meetings, and document workflows."
    impact: "Switching later may require changing collaboration habits and retraining staff, not just replacing a model."
    mitigation: "Keep original documents in standard formats, document approved use cases, and avoid building critical workflows that only exist as Copilot prompts."
  - risk: "Permission remediation backlog"
    scenario: "Copilot rollout reveals years of inherited SharePoint and Teams access debt."
    impact: "Rollout may stall or expose sensitive material to users who technically had access but no business need."
    mitigation: "Treat permissions cleanup as a pilot prerequisite and assign site owners before rollout."
  - risk: "Plan-specific controls"
    scenario: "The company assumes all security controls are available, but some require E5, Purview, or additional configuration."
    impact: "Procurement may approve a tool without the controls needed for the target risk level."
    mitigation: "Map required controls to actual licenses before purchase."
human_oversight_checklist:
  - control: "Named pilot owner approves use cases and user group."
    owner: "COO"
    status: "Required"
    evidence: "Pilot charter with allowed and prohibited uses."
  - control: "Generated external content is reviewed by an accountable employee before sending."
    owner: "Department leads"
    status: "Required"
    evidence: "Review checklist for proposals, emails, and client deliverables."
  - control: "Users verify source documents for factual or contractual claims."
    owner: "Pilot users"
    status: "Required"
    evidence: "User guidance and spot checks."
  - control: "Sensitive meetings require explicit approval before transcription and AI summary."
    owner: "Legal or operations"
    status: "Recommended"
    evidence: "Meeting recording policy and Teams admin settings."
recommended_controls:
  - priority: "P0"
    control: "Complete a targeted permissions cleanup for pilot users and high-risk repositories."
    rationale: "The largest practical risk is exposing already-overshared data through AI search and summarization."
    owner: "IT"
    timing: "Before pilot"
  - priority: "P0"
    control: "Disable third-party agents/connectors during the first pilot unless separately reviewed."
    rationale: "This keeps data flows bounded while the company learns operational behavior."
    owner: "IT security"
    timing: "Before pilot"
  - priority: "P1"
    control: "Publish an AI acceptable-use note for Copilot."
    rationale: "Users need clear boundaries for personal data, client confidential data, legal advice, and external reuse."
    owner: "Operations"
    timing: "Pilot week 1"
  - priority: "P1"
    control: "Collect user feedback and incident reports for 30 days."
    rationale: "The company needs evidence before expanding from pilot to broad deployment."
    owner: "Pilot owner"
    timing: "During pilot"
final_recommendation:
  outcome: "Go with controls"
  rationale: "Proceed with a limited pilot only after permissions, web query, retention, and agent settings are confirmed. The tool is credible for productivity use, but the deployment should be treated as a data governance project, not a simple software enablement."
  conditions:
    - "Pilot limited to 25 named users and approved use cases."
    - "Permissions cleanup completed for pilot SharePoint sites, Teams channels, and OneDrive folders."
    - "No HR, legal, health, credit, or automated decision use without separate review."
    - "Human review required before client-facing reuse."
  pause_triggers:
    - "Material unresolved external sharing or guest access findings."
    - "No clear tenant-level retention/audit answer for prompts and responses."
    - "Business insists on immediate company-wide rollout."
  next_review: "Repeat after 30 pilot days or before enabling agents, connectors, or company-wide rollout."
