review:
  id: "sample-chatgpt-team"
  title: "ChatGPT Team / Business Vendor Risk Review"
  version: "0.1.0"
  date: "2026-06-19"
  reviewer: "Jose Robles"
  status: "sample"
vendor:
  name: "OpenAI"
  product: "ChatGPT Team / ChatGPT Business"
  plan: "Team or Business workspace"
  homepage: "https://chatgpt.com/business/business-plan/"
  privacy_url: "https://openai.com/enterprise-privacy/"
  security_url: "https://openai.com/business-data/"
  terms_url: "https://openai.com/policies/business-terms/"
adoption_scenario:
  company_profile: "A 60-person B2B software company in Spain evaluating a shared ChatGPT workspace for product, support, sales, and engineering productivity."
  intended_use: "Use ChatGPT for drafting support replies, summarizing customer feedback, writing internal product briefs, generating SQL or code snippets, and preparing sales collateral."
  users: "Support managers, product managers, sales engineers, and a small engineering pilot group."
  deployment_context: "Employees already use personal AI tools informally. The company wants a managed workspace with admin controls, but has not yet defined what customer or source-code data may be entered."
  decision_impact: "Outputs will support drafts and internal analysis. They must not be used as final legal, security, customer entitlement, hiring, or production code decisions without human review."
  non_goals:
    - "No automated customer eligibility, pricing, or account restriction decisions."
    - "No uploading production secrets, private keys, regulated health data, or full customer databases."
    - "No fine-tuning or custom external integration in this first review."
executive_summary:
  verdict: "Go with controls"
  risk_level: "Medium"
  summary: "A managed ChatGPT workspace can reduce shadow AI risk compared with personal accounts, but only if the company defines data entry rules, admin responsibilities, retention expectations, and review workflows. The main risk is users pasting sensitive customer data, confidential roadmap material, credentials, or proprietary code into prompts without a clear policy."
  key_risks:
    - "Customer support content may contain personal data, contractual issues, or confidential customer context."
    - "Developers may paste source code, logs, credentials, or vulnerability details into prompts."
    - "Workspace admins and provider support processes may have access patterns that need contractual and policy review."
    - "AI-generated code, analysis, and sales claims may be reused without adequate verification."
  key_controls:
    - "Create a data classification policy for prompts before rollout."
    - "Require redaction of customer identifiers and secrets."
    - "Assign workspace admins and review retention/export/delete settings."
    - "Define human review for support, sales, security, and code outputs."
  caveats:
    - "OpenAI public documentation uses ChatGPT Business naming; this sample keeps the chatgpt-team directory for recognizable team-workspace evaluation."
    - "This review does not assess private enterprise terms, DPA execution, or security portal artifacts."
    - "This is a technical procurement review and does not provide legal advice."
data_exposure_map:
  - category: "Customer support data"
    examples:
      - "Support tickets"
      - "Customer complaints"
      - "Contractual context"
      - "Account configuration details"
    source_systems:
      - "Helpdesk"
      - "CRM"
      - "Email"
    exposure_path: "Users may paste excerpts into ChatGPT to summarize, classify, or draft replies."
    sensitivity: "High"
    retention_or_processing_note: "OpenAI states workspace admins can control retention for ChatGPT Business, and deleted or unsaved conversations are removed within stated timeframes subject to caveats."
    control_notes: "Use redaction rules, prohibit full-ticket dumps by default, and require review before sending customer-facing replies."
  - category: "Product and roadmap data"
    examples:
      - "Roadmap notes"
      - "Customer feedback"
      - "Pricing ideas"
      - "Competitive analysis"
    source_systems:
      - "Product docs"
      - "Notion or Confluence"
      - "CRM"
    exposure_path: "Product and sales users may use prompts to convert notes into briefs, release notes, or sales messaging."
    sensitivity: "Medium"
    retention_or_processing_note: "Workspace retention and export controls should be configured before broad use."
    control_notes: "Mark confidential strategy as restricted and require source checking before external claims."
  - category: "Engineering data"
    examples:
      - "Code snippets"
      - "Stack traces"
      - "Logs"
      - "Architecture diagrams"
    source_systems:
      - "GitHub"
      - "CI logs"
      - "Monitoring"
      - "Internal docs"
    exposure_path: "Engineers may paste snippets or errors into ChatGPT for debugging or explanation."
    sensitivity: "High"
    retention_or_processing_note: "Secrets and customer identifiers can appear in logs and code, making prompt hygiene critical."
    control_notes: "Prohibit secrets and production logs, require local redaction, and define rules for AI-generated code review."
ai_act_role_hypothesis:
  likely_role: "Customer as deployer of a general-purpose AI product in a professional context; OpenAI as vendor/provider of the service, subject to product and contractual details."
  risk_classification: "Likely not high-risk for the stated drafting, summarization, and productivity scenario, provided outputs do not determine decisions affecting people or access to essential services."
  rationale: "The proposed use is assistive and internal. Human users remain accountable for support replies, sales collateral, product decisions, and code changes. The hypothesis changes if outputs are used to make or materially influence decisions about people, customers, employment, credit, health, education, or legal rights."
  caveats:
    - "General-purpose AI obligations and transparency rules may matter separately from high-risk classification."
    - "Use in HR, customer scoring, fraud decisions, or automated support resolution requires separate review."
    - "A legal review is needed for final AI Act role allocation and contractual duties."
  review_triggers:
    - "Connecting ChatGPT to internal systems through custom GPTs, actions, API integrations, or knowledge connectors."
    - "Using generated outputs to decide refunds, eligibility, account restrictions, or complaint outcomes."
    - "Allowing production code suggestions without engineering review and security testing."
security_privacy_questions:
  - category: "Training and data use"
    question: "For the purchased workspace plan, are customer prompts, files, and outputs used to train OpenAI models by default?"
    why_it_matters: "Procurement must confirm business-data commitments for the exact plan and contract."
    evidence_needed: "OpenAI plan documentation, DPA, business terms, or security portal artifact."
  - category: "Retention"
    question: "What retention period is configured for workspace conversations, and who can export or delete them?"
    why_it_matters: "Retention affects privacy, investigations, eDiscovery, and incident response."
    evidence_needed: "Workspace admin setting screenshot and policy owner approval."
  - category: "Admin visibility"
    question: "Which workspace admins can view, export, or delete user conversations, and under what policy?"
    why_it_matters: "Internal admin access can itself become a privacy and confidentiality risk."
    evidence_needed: "Admin role list, access policy, and audit process."
  - category: "Source code"
    question: "What kinds of source code, logs, and vulnerability details are users allowed to submit?"
    why_it_matters: "Engineering prompts can contain IP, credentials, customer data, or security-sensitive context."
    evidence_needed: "Engineering acceptable-use rule and examples of allowed/disallowed prompts."
lock_in_risks:
  - risk: "Prompt workflow dependency"
    scenario: "Teams build daily drafting, support, or analysis habits around a single workspace."
    impact: "Switching tools later can disrupt workflows and reduce productivity if prompts and processes are undocumented."
    mitigation: "Store reusable prompts and policies in company-owned documentation, not only inside chat history."
  - risk: "Workspace knowledge accumulation"
    scenario: "Users treat chat history as a knowledge base for product and customer context."
    impact: "Important operational knowledge becomes hard to export, govern, or migrate."
    mitigation: "Require final decisions, reusable outputs, and approved guidance to be copied into canonical internal systems."
  - risk: "Generated-code reliance"
    scenario: "Engineers speed up implementation using AI-generated code without review discipline."
    impact: "Security, licensing, maintainability, and correctness risks can accumulate invisibly."
    mitigation: "Apply normal code review, tests, SAST, dependency review, and human ownership to generated code."
human_oversight_checklist:
  - control: "Human owner remains accountable for every customer-facing reply."
    owner: "Support lead"
    status: "Required"
    evidence: "Support workflow requiring review before sending."
  - control: "Generated code is reviewed and tested like human-written code."
    owner: "Engineering manager"
    status: "Required"
    evidence: "Pull request checklist and CI evidence."
  - control: "Users redact personal data, secrets, and customer identifiers unless explicitly approved."
    owner: "All users"
    status: "Required"
    evidence: "Acceptable-use policy and onboarding record."
  - control: "Workspace admin actions are logged and periodically reviewed."
    owner: "IT or operations"
    status: "Recommended"
    evidence: "Admin review cadence and access list."
recommended_controls:
  - priority: "P0"
    control: "Create a prompt data classification rule before inviting users."
    rationale: "Users need concrete boundaries for customer data, secrets, code, and confidential business information."
    owner: "COO and security owner"
    timing: "Before rollout"
  - priority: "P0"
    control: "Configure workspace admins, retention, SSO/MFA, and export policy."
    rationale: "The company needs managed controls before replacing shadow AI use."
    owner: "IT"
    timing: "Before rollout"
  - priority: "P1"
    control: "Create approved prompt examples for support, product, sales, and engineering."
    rationale: "Good defaults reduce risky copy-paste behavior."
    owner: "Department leads"
    timing: "Pilot week 1"
  - priority: "P1"
    control: "Run a 30-day incident and value review."
    rationale: "Expansion should be based on evidence of useful and safe behavior."
    owner: "Pilot owner"
    timing: "After pilot"
final_recommendation:
  outcome: "Go with controls"
  rationale: "Approve a managed workspace pilot as a safer alternative to unmanaged personal AI use, but only with explicit data-entry rules, admin configuration, and human review. The company should avoid treating the tool as approved for sensitive decisions or unrestricted code/data uploads."
  conditions:
    - "Workspace purchased under business terms, not personal accounts."
    - "Retention, admin roles, SSO/MFA, and export controls documented."
    - "No secrets, full customer databases, regulated health data, or production logs in prompts."
    - "Human review required for customer, sales, security, and code outputs."
  pause_triggers:
    - "No DPA or business-data commitment available for the plan."
    - "Teams insist on uploading raw customer datasets or production logs."
    - "Outputs will decide customer eligibility, refunds, hiring, or account restrictions."
  next_review: "Repeat before adding connectors, custom GPT actions, API integrations, or high-impact decision workflows."
