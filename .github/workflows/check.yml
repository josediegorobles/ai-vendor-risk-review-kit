name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint/check scripts
        run: npm run lint

      - name: Validate sample YAML
        run: npm run validate

      - name: Test generator
        run: npm test

      - name: Generate reports
        run: npm run generate

      - name: Ensure generated reports are committed
        run: git diff --exit-code reports
